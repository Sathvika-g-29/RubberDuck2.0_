openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: Rubber duck debugging chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /chat/stream:
    post:
      operationId: streamChat
      tags: [chat]
      summary: Stream a chat response (SSE)
      description: >
        Sends messages to the rubber duck AI and streams the response
        token-by-token via Server-Sent Events. The response Content-Type
        will be text/event-stream; use fetch + ReadableStream on the client.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: SSE stream of tokens
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
    ChatInput:
      type: object
      required: [messages, mode, exchangeCount]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        mode:
          type: string
          enum: [socratic, nudge, debrief, giveup]
        exchangeCount:
          type: integer
          minimum: 0
          description: Number of completed assistant exchanges so far
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
